name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (Rust core)
        run: |
          cargo test --workspace --exclude simlens-py
          cargo test -p simlens-core --features bundle
      - name: build + install
        # `maturin develop` needs an active virtualenv; `pip install` uses the maturin
        # build backend directly, so it works on the bare CI runner (all OSes).
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: pytest
        run: pytest -q

  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --exclude simlens-py -- -D warnings
      - run: cargo clippy -p simlens-core --features bundle -- -D warnings

  benchmarks:
    name: faithfulness + perf smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: faithfulness benchmark harness (regression guard)
        run: pytest -q tests/test_faithfulness_bench.py
      - name: perf harness smoke
        run: python benchmarks/bench.py --json --iters 200 --dims 384

# Wheels are built on tagged releases (.github/workflows/release.yml), not on every push —
# no need to burn the constrained macOS runner pool per-commit.
